server:
  port: "8080"

log:
  level: "info"

database:
  url: "postgres://postgres:postgres@localhost:5432/mynance?sslmode=disable"

db:
  max_conns: 10

outbox:
  poll_interval_seconds: 1

# JWT_SECRET must be >= 32 chars. Override via env var in production.
jwt:
  secret: "dev-only-secret-change-in-prod-32!"
